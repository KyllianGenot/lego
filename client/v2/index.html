<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>🧱 Lego | Predictability of a lego set deal</title>
    <style>
      /* Ajout de styles pour les boutons favoris */
      .favorite-btn {
        background-color: #ffcc00;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        margin-left: 10px;
      }
      .favorite-btn.favorited {
        background-color: #ff6666;
      }
    </style>
  </head>
  <body>
    <h1>Lego</h1>
    <section id="options">
      <div id="show">
        <label for="show-select">Show:</label>
        <select name="show" id="show-select">
          <option value="6">6</option>
          <option value="12">12</option>
          <option value="24">24</option>
        </select>
      </div>
      <div id="page">
        <label for="page-select">Go to page:</label>
        <select name="page" id="page-select"> </select>
      </div>
      <div id="filters">
        <div>
          <label for="discount-filter">Filter by discount (%):</label>
          <input type="number" id="discount-filter" min="0" max="100" placeholder="Enter discount %">
          <button id="apply-discount-filter">Apply</button>
        </div>
        <button id="filter-most-commented">By most commented (>15 comments)</button>
        <button id="filter-hot-deals">By hot deals (>100°)</button>
        <button id="filter-favorites">By favorites</button>
        <button id="clear-filters">Clear filters</button>
      </div>
      <div id="sort">
        <label for="sort-select">Sort:</label>
        <select name="sort" id="sort-select">
          <option value="price-asc">Cheaper</option>
          <option value="price-desc">Expensive</option>
          <option value="date-asc">Recently published</option>
          <option value="date-desc">Anciently published</option>
        </select>
      </div>
    </section>
    <section id="lego">
      <h2>Lego sets</h2>
      <div>
        <label>Lego set id:</label>
        <select id="lego-set-id-select"></select> 
      </div>
    </section>
    <section id="indicators">
      <h2>Indicators</h2>
      <div>
        <span>Number of deals</span>
        <span id="nbDeals">0</span>
      </div>
      <div>
        <span>Number of sales</span>
        <span id="nbSales">0</span>
      </div>
      <div>
        <span>p5 sales price value</span>
        <span>0</span>
      </div>
      <div>
        <span>p25 sales price value</span>
        <span>0</span>
      </div>
      <div>
        <span>p50 sales price value</span>
        <span>0</span>
      </div>
      <div>
        <span>Lifetime value</span>
        <span>10 days</span>
      </div>
    </section>
    <section id="deals"></section>
    <script type="text/javascript" charset="UTF-8" src="utils.js"></script>
    <script type="text/javascript" charset="UTF-8" src="portfolio.js"></script>
  </body>
</html>
